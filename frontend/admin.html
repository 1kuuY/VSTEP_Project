<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Control Panel - VSTEP</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #0f172a;
        color: #f8fafc;
        font-family: "Segoe UI", sans-serif;
      }
      .admin-card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 16px;
        padding: 30px;
      }
      textarea {
        background: #0f172a !important;
        color: #10b981 !important;
        font-family: "Courier New", Courier, monospace;
        border: 1px solid #334155 !important;
        resize: vertical;
      }
      textarea:focus {
        box-shadow: none;
        border-color: #10b981 !important;
      }
    </style>
  </head>
  <body>
    <script>
      const pass = prompt("Khu vực tuyệt mật! Nhập mật khẩu Admin để vào:");
      if (pass !== "admin123") {
        alert("Sai mật khẩu! Đang chuyển hướng...");
        window.location.href = "login.html"; // Đá văng ra ngoài
      }
    </script>

    <div class="container py-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-info">Admin Panel - Thêm Đề Thi Mới</h2>
        <a
          href="dashboard.html"
          class="btn btn-outline-light btn-sm rounded-pill px-4"
          >Về trang chủ</a
        >
      </div>

      <div class="admin-card shadow-lg">
        <h5 class="mb-3">Dán dữ liệu JSON của đề thi vào đây:</h5>
        <div
          class="alert alert-warning bg-opacity-10 border-warning text-warning mb-4"
        >
          <small
            >💡 <strong>Gợi ý:</strong> Copy toàn bộ nội dung trong file
            <code>exam-data.json</code> hoặc
            <code>listening-data.json</code> rồi dán vào ô dưới đây.</small
          >
        </div>

        <textarea
          id="jsonInput"
          class="form-control mb-4"
          rows="15"
          placeholder='[
  {
    "id": "read_02",
    "title": "VSTEP Reading Test 2",
    "skill": "reading",
    ...
  }
]'
        ></textarea>

        <button
          id="btn-upload"
          class="btn btn-success fw-bold px-5 py-2 rounded-pill w-100 fs-5"
          onclick="uploadExam()"
        >
          ĐẨY LÊN DATABASE
        </button>
        <div id="statusMessage" class="mt-3 text-center fw-bold"></div>
      </div>
    </div>

    <script>
      async function uploadExam() {
        const btn = document.getElementById("btn-upload");
        const statusDiv = document.getElementById("statusMessage");
        const jsonText = document.getElementById("jsonInput").value.trim();

        if (!jsonText) {
          statusDiv.innerHTML =
            "<span class='text-danger'>Vui lòng dán dữ liệu JSON vào ô trống trước khi tải lên!</span>";
          return;
        }

        try {
          // Kiểm tra xem JSON có hợp lệ không trước khi gửi
          const parsedData = JSON.parse(jsonText);

          // Đổi trạng thái nút
          btn.innerHTML =
            '<span class="spinner-border spinner-border-sm me-2"></span> Đang lưu vào hệ thống...';
          btn.disabled = true;

          // Gửi lên Backend
          const response = await fetch(
            "https://vstep-project.onrender.com/api/exams",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(parsedData),
            },
          );

          const result = await response.json();

          if (response.ok) {
            statusDiv.innerHTML = `<span class='text-success'>${result.message}</span>`;
            document.getElementById("jsonInput").value = ""; // Xóa form
          } else {
            statusDiv.innerHTML = `<span class='text-danger'>Lỗi: ${result.message}</span>`;
          }
        } catch (error) {
          console.error(error);
          statusDiv.innerHTML =
            "<span class='text-danger'>Lỗi cú pháp JSON! Vui lòng kiểm tra lại định dạng dấu phẩy, dấu ngoặc.</span>";
        } finally {
          // Phục hồi nút
          btn.innerHTML = "ĐẨY LÊN DATABASE";
          btn.disabled = false;
        }
      }
    </script>

    <script src="config.js"></script>
  </body>
</html>
