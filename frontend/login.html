<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - VSTEP Prep</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="login-page">
    <div
      class="container vh-100 d-flex justify-content-center align-items-center position-relative z-1"
    >
      <div class="card login-card shadow-2xl rounded-4">
        <div class="card-body text-center card-inner-padding">
          <div class="mb-5 header-zone">
            <div class="brand-logo mb-3 shadow-lg">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="32"
                height="32"
                fill="currentColor"
                class="bi bi-book"
                viewBox="0 0 16 16"
              >
                <path
                  d="M1 2.828c.885-.37 2.154-.769 3.388-.893 1.33-.134 2.458.063 3.112.752v9.746c-.935-.53-2.12-.603-3.213-.493-1.18.12-2.37.461-3.287.811V2.828zm7.5-.141c.654-.689 1.782-.886 3.112-.752 1.234.124 2.503.523 3.388.893v9.923c-.918-.35-2.107-.692-3.287-.81-1.094-.111-2.278-.039-3.213.492V2.687zM8 1.783C7.015.936 5.587.81 4.287.94c-1.514.153-3.042.672-3.994 1.105A.5.5 0 0 0 0 2.5v11a.5.5 0 0 0 .707.455c.882-.4 2.303-.881 3.68-1.02 1.409-.142 2.59.087 3.223.877a.5.5 0 0 0 .78 0c.633-.79 1.814-1.019 3.222-.877 1.378.139 2.8.62 3.681 1.02A.5.5 0 0 0 16 13.5v-11a.5.5 0 0 0-.293-.455c-.952-.433-2.48-.952-3.994-1.105C10.413.809 8.985.936 8 1.783z"
                />
              </svg>
            </div>
            <h2
              class="fw-bold text-white tracking-wide mb-1 web-short-name"
            ></h2>

            <p class="text-slate-300 fs-6">
              Nền tảng
              <strong class="web-full-name text-warning"
                >VSTEP Preparation</strong
              >
              ôn luyện thi tối ưu
            </p>
          </div>

          <button
            class="btn btn-google-premium w-100 py-3 rounded-3 fw-bold d-flex justify-content-center align-items-center"
            onclick="loginMock()"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 48 48"
              class="me-3"
            >
              <path
                fill="#EA4335"
                d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"
              />
              <path
                fill="#4285F4"
                d="M46.5 24c0-1.55-.15-3.24-.47-4.77H24v9.03h12.75c-.55 2.86-2.17 5.29-4.6 6.92l7.18 5.57c4.19-3.86 6.67-9.54 6.67-16.75z"
              />
              <path
                fill="#FBBC05"
                d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.98-6.19z"
              />
              <path
                fill="#34A853"
                d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.18-5.57c-1.99 1.34-4.55 2.13-8.71 2.13-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
              />
            </svg>
            Tiếp tục với Google
          </button>

          <p
            class="mt-5 mb-0 text-slate-400 font-monospace"
            style="font-size: 0.85rem; letter-spacing: 1px"
          >
            ⚡ Giữ mắt thư giãn • Sẵn sàng bứt phá ⚡
          </p>
        </div>
      </div>
    </div>

    <script>
      function loginMock() {
        const btn = document.querySelector(".btn-google-premium");
        btn.innerHTML =
          '<span class="spinner-border spinner-border-sm me-3 text-info" role="status" aria-hidden="true"></span> <span class="text-white">Đang đăng nhập...</span>';
        btn.classList.add("disabled");

        setTimeout(() => {
          document.body.style.opacity = "0";
          document.body.style.transition = "opacity 0.4s ease";
          setTimeout(() => {
            window.location.href =
              "https://vstep-project.onrender.com/auth/google";
          }, 400);
        }, 800);
      }
    </script>

    <script src="config.js"></script>
  </body>
</html>
